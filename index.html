<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Voice Caller Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    height:100vh;
    font-family:'Poppins', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated background glow */
body::before {
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:linear-gradient(45deg,#00c6ff,#ff00cc);
    border-radius:50%;
    filter:blur(150px);
    animation:move 10s infinite alternate;
}

@keyframes move {
    from { transform:translate(-100px,-100px); }
    to { transform:translate(100px,100px); }
}

/* Main Card */
.container {
    position:relative;
    width:380px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(30px);
    box-shadow:0 30px 80px rgba(0,0,0,0.7);
    text-align:center;
    z-index:2;
}

/* Title */
h1 {
    font-family:'Orbitron';
    font-size:28px;
    margin-bottom:10px;
}

.tag {
    font-size:13px;
    opacity:0.7;
}

/* Input */
input {
    width:100%;
    padding:14px;
    margin-top:25px;
    border-radius:12px;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

/* Button */
button {
    width:100%;
    padding:14px;
    margin-top:20px;
    border-radius:12px;
    border:none;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 30px #00c6ff;
}

/* Status */
.status {
    margin-top:15px;
    font-size:14px;
}

/* Mic animation */
.mic {
    width:70px;
    height:70px;
    margin:20px auto;
    border-radius:50%;
    background:linear-gradient(45deg,#ff00cc,#00c6ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    animation:pulse 2s infinite;
}

@keyframes pulse {
    0% { box-shadow:0 0 0 0 rgba(0,198,255,0.7); }
    70% { box-shadow:0 0 0 25px rgba(0,198,255,0); }
    100% { box-shadow:0 0 0 0 rgba(0,198,255,0); }
}

/* Wave bars */
.wave {
    display:flex;
    justify-content:center;
    gap:4px;
    margin-top:10px;
}

.wave span {
    width:4px;
    height:20px;
    background:#00c6ff;
    animation:wave 1s infinite;
}

.wave span:nth-child(2){animation-delay:0.2s;}
.wave span:nth-child(3){animation-delay:0.4s;}
.wave span:nth-child(4){animation-delay:0.6s;}

@keyframes wave {
    0%,100%{transform:scaleY(0.3);}
    50%{transform:scaleY(1.3);}
}

/* Call log */
.logs {
    margin-top:20px;
    max-height:120px;
    overflow:auto;
    font-size:12px;
    text-align:left;
    opacity:0.8;
}

.logs div {
    margin-bottom:5px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    padding-bottom:3px;
}
</style>
</head>

<body>

<div class="container">

<h1> Vaani AI </h1>
<p class="tag">Real-time AI Voice System</p>

<input id="phone" placeholder="+91XXXXXXXXXX">

<button onclick="call()">Start Call</button>

<div class="mic">🎤</div>

<div class="wave">
<span></span><span></span><span></span><span></span>
</div>

<div class="status" id="status">Waiting...</div>

<div class="logs" id="logs"></div>

</div>

<script>
function log(msg){
    const logs=document.getElementById("logs");
    logs.innerHTML += "<div>"+msg+"</div>";
    logs.scrollTop=logs.scrollHeight;
}

function call(){
    const phone=document.getElementById("phone").value;
    const status=document.getElementById("status");

    status.innerText="📡 Connecting...";
    log("Calling "+phone);

    fetch("https://avowed-anthony-unyielded.ngrok-free.dev/call",{
        method:"POST",
        headers:{ "Content-Type":"application/json"},
        body:JSON.stringify({ phone })
    })
    .then(res=>res.text())
    .then(data=>{
        status.innerText="📞 Call Active";
        log("Call started");
    })
    .catch(err=>{
        status.innerText="❌ Error";
        log("Error: "+err);
    });
}
</script>

</body>
</html>
